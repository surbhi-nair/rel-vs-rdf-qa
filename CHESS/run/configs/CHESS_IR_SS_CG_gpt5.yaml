setting_name: CHESS_IR_SS_CG

team_agents:
  information_retriever:
    engine: 'gpt-5-mini'
    tools:
      extract_keywords:
        template_name: 'extract_keywords'
        engine_config:
          engine_name: 'gpt-5-mini'
          temperature: 1.0
          reasoning_effort: 'minimal' # Fast keyword extraction; doesn't need deep thought.
        parser_name: 'python_list_output_parser'
      retrieve_entity: {}
      retrieve_context:
        top_k: 3

  schema_selector:
    engine: 'gpt-5-mini'
    tools:
      filter_column:
        template_name: 'filter_column'
        engine_config:
          engine_name: 'gpt-5-mini'
          temperature: 1.0
          reasoning_effort: 'low'      # Basic semantic matching between query and columns.
        parser_name: 'filter_column'

      select_tables:
        mode: 'ask_model'
        template_name: 'select_tables'
        engine_config:
          engine_name: 'gpt-5-mini'
          temperature: 1.0
          reasoning_effort: 'medium'   # Critical: Picking the wrong table breaks the whole pipeline.
        parser_name: 'select_tables'

      select_columns:
        mode: 'ask_model'
        template_name: 'select_columns'
        engine_config:
          engine_name: 'gpt-5-mini'
          temperature: 1.0
          reasoning_effort: 'low'  # Lower effort after tables are already identified.
        parser_name: 'select_columns'

  candidate_generator:
    engine: 'gpt-5-mini'
    tools:
      generate_candidate:
        generator_configs:
          - template_name: 'generate_candidate_one'
            engine_config:
              engine_name: 'gpt-5-mini'
              temperature: 1.0
              reasoning_effort: 'medium'   # Generating a good candidate is important, but we can afford to be a bit faster here.
            parser_name: 'generate_candidate_gemini_markdown_cot'
            sampling_count: 1

      revise:
        template_name: 'revise_one'
        engine_config:
          engine_name: 'gpt-5-mini'
          temperature: 1.0
          reasoning_effort: 'low'
        parser_name: 'revise_new'
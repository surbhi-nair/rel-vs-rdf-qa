[CONFIGURATION]
# INPUT
na_values=,#N/A,N/A,#N/A N/A,n/a,NA,<NA>,#NA,NULL,null,NaN,nan,None

# OUTPUT
output_file=output.nt
output_dir=experiments/bird_minidev/debit_card_specializing
output_format=N-TRIPLES
only_printable_characters=yes
safe_percent_encoding=yes
; encode_unicode_characters=yes
; invalid_characters_replacement=_

# MAPPINGS
mapping_partitioning=off
infer_sql_datatypes=no

# MULTIPROCESSING
number_of_processes=1

# LOGS
logging_level=INFO
logs_file= logs/config.log

[DataSource1]
mappings=experiments/bird_minidev/debit_card_specializing/debit_card_specializing.rml.ttl
db_url=sqlite:///data/MINIDEV/dev_databases/debit_card_specializing/debit_card_specializing.sqlite